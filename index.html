<!DOCTYPE html>
<html>
<head>
  <title>Quick Note</title>
  <style>
    body { display: flex; font-family: Arial; }
    #sidebar { width: 200px; border-right: 1px solid gray; padding: 10px; }
    #main { flex: 1; padding: 10px; }
    textarea { width: 100%; height: 300px; }
    .note-item { cursor: pointer; margin: 5px 0; }
  </style>
</head>
<body>

<div id="sidebar">
  <button id="addNote">+ New</button>
  <div id="notesList"></div>
</div>

<div id="main">
  <input id="title" placeholder="Title"><br><br>
  <textarea id="content"></textarea><br><br>
  <button id="save">Save</button>
  <button id="delete">Delete</button>
</div>

<script src="renderer.js"></script>
</body>
</html>
